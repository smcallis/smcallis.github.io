<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ares</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  var Module = { canvas: document.getElementById('canvas') };

  // The app to load, e.g. ?app=rasterize_lion. Its .js and .wasm must be
  // served beside this page.
  const app = new URLSearchParams(location.search).get('app') || 'rasterize_lion';
  const script = document.createElement('script');
  script.src = app + '.js';
  document.body.appendChild(script);
</script>
</body>
</html>
