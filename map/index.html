<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ares</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  var Module = { canvas: document.getElementById('canvas') };

  // The app to load, e.g. ?app=rasterize_lion. Its .js and .wasm must be
  // served beside this page.
  const app = new URLSearchParams(location.search).get('app') || 'map';

  // The map reads its atlas from the virtual filesystem, so fetch the
  // binary, served beside this page, before main() runs. The fetch shares
  // the wire with the wasm download and the browser caches it on its own.
  if (app === 'map') {
    Module.preRun = [function () {
      // Runs inside the module scope, where the filesystem and run
      // dependency helpers are plain identifiers.
      addRunDependency('atlas');
      fetch('atlas.bin')
        .then((response) => {
          if (!response.ok) throw new Error('atlas.bin ' + response.status);
          return response.arrayBuffer();
        })
        .then((buffer) => {
          FS.writeFile('/atlas.bin', new Uint8Array(buffer));
          removeRunDependency('atlas');
        });
    }];
  }

  const script = document.createElement('script');
  script.src = app + '.js';
  document.body.appendChild(script);
</script>
</body>
</html>
